front:
  text: 太霄琅書瓊文帝章訣成二
  hash: sha256:bf70b6b484a47f3607bbe86df4cef0ec8a7f34a5bb632ee11151d53d135931d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0130_HFL_000-001a, image: hfl/0059/0059-066.png}
body:
  text: 師資行事書經訣凡得經有已皆應更書先者為鎮供養而巳今所寫治精加校定豐財足力各立三通一為長鎮一為供齋一為研習研習者常自隨所住室中别置格上躬自出入不得使他若家人弟子同氣至心可得使之亦勿全委非其故為怠慢學淺識解未精或致忤禁彼此受殃明詳謹愼納吉防凶寫經之時皆修清齋法當手書與師易本或在門伏膺雜役不暇自書或未間筆墨或遲拙不精富者可以金帛顧人貧者聽得傭夫聚直必借妙迹不可苟營文字訛謬圖象失形並有考罰福豈爰臻經中有圖圖或别卷各有侍官典圖真吏玉童玉女與經略同不可逐易避難起經棄圖象誤許洗治一紙不過三處簡素一紙亦不過三過三皆易火淨所誤連染剪齊首軸帶祑囊藴巾帊厨箱令堅完淨而巳不得過華世間教化化世捨華華末能捨權制用華使世間人損俗華麗華麗供法漸識素方得素後華自然不壞不求自得不為自成自然而然莫能使之不然緣素果此勿滯俗華臺堂行裝各有豐儉富貧相稱不得強為富者強陋貧者強華華奢陋儉皆乖道制道制貴中內外相應非意去失首謝愆尢清齋懴悔各依太真之科久壞攺易具如太真之法香燈禮拜尊修唯精精必成聖與道合真也啓告訣弟子因緣慿師請法冝傳付者先使寫經圖録巳竟擇日結齋齋時啓告大略如左齋法雖多皆準三元三元齋科包羅諸法授受上經同用上元其間所啓事源隨時消息攺易簡要勿繁也凡齋啓告先治辭牒不可暗慢率略千真為牒之宜先稱某國號某年太歲某某月朔某日某時某州郡縣鄉里某位男女官祭酒道士先生真人元君夫人姓名今於某州郡縣鄉里山舍治館宫府第宅就某州郡縣鄉里男女道士法師姓名受大洞真經目録如左洞真部卷第如干以次書之緣都得者謹依第至後緣偏得者未冝并受隨冝出之不須卷第直舉篇名多少依實一二條之右如干卷今對齋啓告傳度謹牒某州郡縣鄉里某位姓名辭幸籍善緣歲奉玄極參受寶文誠歡誠慰妄以短命志願長生貪進忘退遭逢佳辰乞請受前件如干卷依科交齎某等如干種法信奉辭以聞伏願師君垂許誓心修行不負師道有違之日自分風刀不敢有怨一依明科謹辭太歲某某月日時於某山舍奉傳諱訣凡傳經寶要在存師師之所師所師之師三人鄉居男女位號姓名字年傳經處所付授弟子黃素書之佩帶自隨不可去失去失謫罰皆如太真之科不恆帶者附著經中别以巾藴褁結令竪師所師玄師師青童大君又有小君存此二君禮願如法法信訣法信出科科與經異師師口訣各有因緣時科事革所以不同愼勿疑惑從師施行若無師者啓玄有儀依格出信不得有違卷卷别受科科稍傳經科相參師資量準雖以輕易重以易除難要當思想物儀不乖其方因緣能得頓受者所用如左一上金九兩二紫錦百二十尺三五色紋繒各四十尺四白素一千二百尺五紫紋二十四丈六命綵支干相入紋繒隨年匹丈尺七五色絲各三斤八五種香各九斤九玉龍玉魚各三軀十金龍金魚各五軀十一玉鴈玉羊各一軀十二金鴈金羊各一軀十三玉札三枚十四金鐶銀鐶各九雙十五真珠如梧子大三百六十枚十六五色線各依方斤數十七大度紙三百六十幅十八筆五雙十九龍頭書刀五枚二十紫蓋紅裏一張二副朱染頭子全銀交具二十一青蓋碧裏五張三副烏染頭子牙銅交具二十二明鏡一面徑尺者不得或九寸二十三法服冠履手板一具精粗取中新淨香噄二十四淨罌與盤各一枚金銀銅瓦夾紵隨時右二十四種某受經法信此二十四物各有所應積聚營之不可闕一窮地之鄉許用他物準類充補擬議勿乖又無即充可注今闕某物須受法之後營覔補備結齋之始投辭之初便應備辦咨啓師尊有無注奠都定書之續置經目之後連在辭文之前啓告之初并讀至後臨度經時出官奏表又具言之慎勿忽略也師受此信依按明科施用必得其所彼此共保成真若應玄盟亦按此法準採金書之後散施之儀經書不具勿用此訣大人上志精詳遵承也太真九科太上太真王制科成諸法布在衆經或前或後覽者不别冝尋本文本文三卷師之所祕得之密習為天人師今此大要摽略有九九天真人共所遵用教化無之動靜陷咎若有賢明智慧之士求受寶經當示以要律授受之宜依用九條觸類求之無所不具自非體真勿妄增損三洞衆經共準依按太極真人西城王君仙公卿士髙才大人皆寶祕之愼無泄矣第一科曰齋竟授戒授戒之後按儀傳經傳經之年郎為期限限以制心期以見道道為衆妙之主觀妙必覩其宗除欲為上少欲次之深淺隨才優劣依德德量無崖大分有六第一四萬劫第二四萬年第三四千嵗第四四百齡第五四十載第六正四周周劫限竟得傳一人至乎九人明道之尊德之貴也運促時急大慈廣救遇賢便傳不拘定數但初受須微限中求驗若基內逢險為凶所逼智力不能化遜順以避災所得之旨在乎心中無滯卷軸致傷玄真若威勢所制使迫脅本師自度後能治彼以全初志者乃可請師暫順彼意不能如此以死絶之愼勿慢辱本師毀棄正道若智力不能辦勿強云欲治之不度德不量力滅身命無成功徒增罪耳善冝三思若意外去失不自覺知或劫賊所掠弗測存亡皆長齋懴悔捨身命財憑師積年竭盡單𣢾無生怨怠乃更受之受之三失勿復苟受冝加懴悔至到感靈然後更受必登道真無感徒受受終無所成為後作因受勝不受受之不巳心神轉易初雖無成終亦得道第二科曰受經之後諦尋師訓含光內皎不得炫耀年限既竟乃得傳賢賢不易有不可妄傳非其人彼此風刀上延先祖下逮子孫惡深絶種長充鬼徒若限內有災或家門喪死公私鬪爭血傷牢獄水火盜賊重病轗軻年限雖過不得傳人正當謝罪勤立善功告樂如期乃可有授若三尊壽考運數升度或非罪無辜橫罹縲紲此皆無妨依期得傳第三科曰信素證心炳發妙義必令精好以理得之正分所辦撰蓄密營不可誇談勿生吝惜愼莫邪求換乞強索竊略所得自以為功更增咎謫無福可期師受善用三分之一分為弟子營齋助贍香油經籍一分救諸山栖幽苦一分供師法服精粗奉給三尊不得私散散之依法無起慳心不可貪聚招禍纍身損道辱法取誚人神權急偏濟時冝并用先啓三寶後計補充有違招考竊盜律論靈寶同壇者依十二科法第四科曰受經之後存禮無虧若遭病急非意公私事礙致闕回後即謝啓悔慙悚竭洗丹𠂻若浮遊媱泆逐樂驕慢違替之舋長陷酆都第五科曰法應長齋未能者擇其吉會申其誠心年有六月月有十直又不能全者朔半及晦四時八節本命生日隨所堪修不可都廢廢則無功忘道棄法招延凶災非意破齋即應懴謝重犯不悔後墮魔群興之無懈不破不退存道揚法物我兼通成聖有期受號玄德長齋月正月三月五月七月九月十一月一年六月月皆用竒因陽之盛建隂之功功屬各有日一月直十辰一八十四十五十八二十三二十四二十八二十九三十第六科曰齋讀經戒諳練誦習講説宣明日求妙解解必行之勿犯所解犯即懴謝不可重為行坐存文不得怠忘若隱閉自知欺罔人物不戒成敗懶答𧫎疑厭問嫉勝漫瀾詭辭或虛解詐知嗊嗃誤衆破壞文句增減篇章妄造邪議苟生異端違真越正皆致深殃第七科曰宣揚經戒建德立功濟人成巳勸化為上執正開通無生矯假方便利益須智慧才才未深逹不可輕行乖方便體便入妄言但依實旨引導同心俱歸師門看經讀戒證明妙理起發善心使預齋觀化令聞見福緣歡喜相順和而成功不得呵責忿激增愆譬喻誘進弗可強牽將護節量剛柔取中一與一奪種種潤之確迷不轉哀矜勿吝慈悲無巳不生棄心得善知識誓俱登玄貴師愛資克果上真第八科曰師愍弟子平等一心無所偏頗賞罰必明罰以止惡賞以勸善纎毫無遺涓芥勿謬謬偏被災幽顯重考第九科曰弟子恭愼事師無二寡動少言沉懿靜篤伺候師顔咨稟妙訣思樹效績輔讃三寶專心竭力奉命便行水火不避逺近弗辭疑即啓審許革則悛不許仍從有殞無避師試弟子令其心堅登道入真階級優劣使其識悟日分所之督勵彌精克弘至道凡師威神薄不可妄試人聖明之師試無損敗吉凶逆順一隨明師若遭惡師法無惡惡由巳招死不得怨正應自責攺往修來若猶豫疑師不宜奉事事則順從不得違逆逆則失道永嬰塗炭明各愼始勉勗今終右九科九宫真人申明此要十方巳得道無量大聖衆咸共遵行拯度一切太霄琅書瓊文帝章訣終
